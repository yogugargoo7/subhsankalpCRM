name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'Frontend/**'
      - '.github/workflows/azure-static-web-apps-black-desert-0c929c500.yml'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build
        working-directory: Frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://subhsankalp-backend-new.azurewebsites.net/api
          VITE_API_BASE_URL_HTTP: https://subhsankalp-backend-new.azurewebsites.net/api
          VITE_APP_NAME: Goldencity CRM
          VITE_APP_VERSION: 1.0.0
          VITE_NODE_ENV: production
          VITE_ENABLE_SWAGGER: false
          VITE_ENABLE_DEBUG: false
          VITE_COMPANY_NAME: Subh Sankalp Estate

      - name: Create deployment zip
        run: |
          cd Frontend/build
          zip -r ../../deploy.zip .
          echo "Zip size: $(ls -lh ../../deploy.zip)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Azure REST API (zipdeploy)
        run: |
          TOKEN=$(az account get-access-token --query accessToken -o tsv)
          RESPONSE=$(curl -s -X POST \
            "https://management.azure.com/subscriptions/a6759275-4ff2-4eaa-aa16-7c1a481e16ed/resourceGroups/SubhSankalpGroup/providers/Microsoft.Web/staticSites/subhsankalp-frontend/builds/default/zipdeploy?api-version=2022-03-01" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @deploy.zip \
            -w "\nHTTP_STATUS:%{http_code}")
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
