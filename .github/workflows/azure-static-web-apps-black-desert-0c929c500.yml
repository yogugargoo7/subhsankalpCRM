name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'Frontend/**'
      - '.github/workflows/azure-static-web-apps-black-desert-0c929c500.yml'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build
        working-directory: Frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://subhsankalp-backend-new.azurewebsites.net/api
          VITE_API_BASE_URL_HTTP: https://subhsankalp-backend-new.azurewebsites.net/api
          VITE_APP_NAME: Goldencity CRM
          VITE_APP_VERSION: 1.0.0
          VITE_NODE_ENV: production
          VITE_ENABLE_SWAGGER: false
          VITE_ENABLE_DEBUG: false
          VITE_COMPANY_NAME: Subh Sankalp Estate

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Azure Static Web Apps
        working-directory: Frontend
        run: swa deploy ./build --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_DESERT_0C929C500 }}" --env production
