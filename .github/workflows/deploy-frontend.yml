name: Deploy Frontend to goldencityaligarh.com

on:
  push:
    branches:
      - main
    paths:
      - 'Frontend/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build
        working-directory: Frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://subhsankalp-backend-new.azurewebsites.net/api
          VITE_API_BASE_URL_HTTP: https://subhsankalp-backend-new.azurewebsites.net/api
          VITE_APP_NAME: Goldencity CRM
          VITE_APP_VERSION: 1.0.0
          VITE_NODE_ENV: production
          VITE_ENABLE_SWAGGER: false
          VITE_ENABLE_DEBUG: false
          VITE_COMPANY_NAME: Subh Sankalp Estate

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: Frontend/build
          skip_app_build: true
